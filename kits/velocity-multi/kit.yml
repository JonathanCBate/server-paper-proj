default_server: paper-lobby
servers:
  - id: velocity
    type: velocity
    port: 25565
  - id: paper-lobby
    type: paper
    port: 25566
  - id: paper-survival
    type: paper
    port: 25567
plugin_bundles:
  velocity: velocity
  paper: paper
